function execTerm(cmd){
  const out=document.getElementById('term-out');if(!out)return;
  out.textContent+=`max@os:~$ ${cmd}\n`;
  const c=cmd.trim().toLowerCase();
  if(c==='help')out.textContent+=`  help · apps · ls · clear · date · sysinfo · whoami · theme · open <app>\n\n`;
  else if(c==='clear')out.textContent='';
  else if(c==='date')out.textContent+=new Date().toString()+'\n\n';
  else if(c==='whoami')out.textContent+='MaxOS User · '+PROFILE_ID+'\n\n';
  else if(c==='apps'||c==='ls')out.textContent+=[...SYS_APPS,...communityApps.filter(a=>a.status==='approved')].map(a=>`  ${a.icon} ${a.name.padEnd(14)} ${a.id}`).join('\n')+'\n\n';
  else if(c==='sysinfo')out.textContent+=`  ╔══════════════════════╗\n  ║   M A X   O S  v4   ║\n  ╠══════════════════════╣\n  ║ Platform: ${IS_MOB?'Mobile':'Desktop'.padEnd(11)}║\n  ║ Theme:   ${THEMES[currentTheme].name.padEnd(12)}║\n  ║ Apps:    ${(SYS_APPS.length+communityApps.length).toString().padEnd(12)}║\n  ║ RAM:     ${(navigator.deviceMemory||'?')+' GB'.padEnd(10)}║\n  ║ CPU:     ${(navigator.hardwareConcurrency||'?')+' cores'.padEnd(8)}║\n  ╚══════════════════════╝\n\n`;
  else if(c==='theme')out.textContent+=`Tema actual: ${THEMES[currentTheme].name}\nUsa openThemeModal() desde consola del browser para cambiar.\n\n`;
  else if(c.startsWith('open ')){const n=c.slice(5).trim();const a=[...SYS_APPS,...communityApps].find(a=>a.id===n||a.name.toLowerCase()===n);if(a){openApp(a.id);out.textContent+=`Abriendo ${a.name}...\n\n`;}else out.textContent+=`App no encontrada: ${n}\n\n`;}
  else if(c)out.textContent+=`Comando no reconocido: ${cmd}\n\n`;
  out.scrollTop=out.scrollHeight;
}

// COMMUNITY APPS
// ═══════════════════════════════════════════════════════════
async function loadCommunityApps(){
  try {
    const r=await fetch(`${FB_URL}${APPS_PATH}.json?auth=${FB_SECRET}`,{signal:AbortSignal.timeout(7000)});
    if(!r.ok)return;const d=await r.json();
    if(d){communityApps=Object.values(d);renderDesktopIcons();renderStartMenu();renderAppDrawer();}
  } catch(e){}
}

function openPubModal(){document.getElementById('pub-modal').classList.add('vis');}
function closePubModal(){document.getElementById('pub-modal').classList.remove('vis');}

async function submitApp(){
  const name=document.getElementById('pub-name')?.value.trim();
  const icon=document.getElementById('pub-icon')?.value.trim()||'📱';
  const desc=document.getElementById('pub-desc')?.value.trim();
  const code=document.getElementById('pub-code')?.value;
  const author=document.getElementById('pub-author')?.value.trim()||'Anónimo';
  if(!name||!code)return showToast('Completá nombre y código');
  showToast('🤖 MAX revisa tu app...');
  const modResult=await moderateApp(code);
  const id='ca_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6);
  const appData={id,name,icon,desc,code,author,status:modResult.safe?'approved':'pending',created:Date.now()};
  try {
    await fetch(`${FB_URL}${APPS_PATH}/${id}.json?auth=${FB_SECRET}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(appData)});
    communityApps.push(appData);closePubModal();renderDesktopIcons();renderStartMenu();renderAppDrawer();
    showToast(modResult.safe?`✅ App "${name}" publicada`:`⏳ "${name}" en revisión`);
    addNotif('MaxStore',modResult.safe?`App "${name}" aprobada.`:`App "${name}" enviada a revisión.`);
  } catch(e){showToast('Error: '+e.message);}
}

async function moderateApp(code){
  const dangers=[/eval\s*\(/gi,/document\.cookie/gi,/fetch\s*\([^)]*telegram|discord\.com\/api/gi];
  const issues=dangers.filter(p=>p.test(code));
  return{safe:issues.length===0,reason:issues.length?'Código sospechoso':'Aprobada'};
}

function renderCustomApp(id,body){
  const app=communityApps.find(a=>a.id===id);
  if(!app)return;
  const frame=document.createElement('iframe');
  frame.style.cssText='width:100%;height:100%;border:none;background:#fff;';
  frame.srcdoc=app.code;
  body.appendChild(frame);
}

function escapeHTML(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ═══════════════════════════════════════════════════════════
// VOICE CONTROL — "max [comando]"
// ═══════════════════════════════════════════════════════════
let voiceCtrlActive = false;
let voiceCtrlRecog = null;

function toggleVoiceControl() {
  if(voiceCtrlActive) stopVoiceControl();
  else startVoiceControl();
}

function startVoiceControl() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) { showToast('❌ Tu navegador no soporta reconocimiento de voz'); return; }
  voiceCtrlRecog = new SpeechRecognition();
  voiceCtrlRecog.lang = 'es-ES';
  voiceCtrlRecog.continuous = true;
  voiceCtrlRecog.interimResults = false;
  voiceCtrlRecog.maxAlternatives = 3;
  voiceCtrlRecog.onresult = (e) => {
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) {
        const transcript = e.results[i][0].transcript.trim().toLowerCase();
        processVoiceCommand(transcript);
      }
    }
  };
  voiceCtrlRecog.onerror = (e) => {
    if(e.error!=='no-speech') { showToast('🎙️ Error voz: '+e.error); }
  };
  voiceCtrlRecog.onend = () => {
    if(voiceCtrlActive) setTimeout(()=>{try{voiceCtrlRecog.start();}catch(e){}},600);
  };
  voiceCtrlRecog.start();
  voiceCtrlActive = true;
  const btn = document.getElementById('voice-ctrl-btn');
  if(btn) { btn.classList.add('listening'); btn.textContent='🔴'; }
  showToast('🎙️ Voz activa — decí "max [comando]"');
  addNotif('Control de Voz','Escuchando. Decí "MAX" + tu comando.');
}

function stopVoiceControl() {
  voiceCtrlActive = false;
  if(voiceCtrlRecog) { try{voiceCtrlRecog.stop();}catch(e){} voiceCtrlRecog=null; }
  const btn = document.getElementById('voice-ctrl-btn');
  if(btn) { btn.classList.remove('listening','active'); btn.textContent='🎙️'; }
  showToast('🎙️ Control de voz desactivado');
}

function processVoiceCommand(text) {
  // Must contain "max" anywhere in the phrase
  if(!text.includes('max')) return;
  // Remove the wake word and clean
  const cmd = text.replace(/\bmax\b/g,'').trim().replace(/^[,.\s]+|[,.\s]+$/g,'');
  if(!cmd) return;
  showToast('🎙️ MAX escuchó: "'+cmd+'"');
  const btn = document.getElementById('voice-ctrl-btn');
  if(btn) { btn.classList.add('active'); setTimeout(()=>btn.classList.remove('active'),1200); }

  // ── System commands ──
  if(/abr[ií]\s+(.+)|open\s+(.+)/.test(cmd)) {
    const appName = (cmd.match(/abr[ií]\s+(.+)/)?.[1] || cmd.match(/open\s+(.+)/)?.[1]||'').trim();
    const found = [...SYS_APPS,...communityApps].find(a=>a.name.toLowerCase().includes(appName)||a.id.includes(appName));
    if(found){openApp(found.id);speakText('Abriendo '+found.name);return;}
  }
  if(/cerr[áa]\s*todo|close all/.test(cmd)){goHome();speakText('Cerrando todo');return;}
  if(/cambi[áa]\s*(el\s*)?tema|change theme/.test(cmd)){openThemeModal();speakText('Abriendo temas');return;}
  if(/cambi[áa]\s*(el\s*)?color\s+(\w+)/.test(cmd)){
    const color=cmd.match(/color\s+(\w+)/)?.[1]||'';
    const idx=THEMES.findIndex(t=>t.name.toLowerCase().includes(color.toLowerCase()));
    if(idx>=0){applyTheme(idx);showToast('🎨 Tema: '+THEMES[idx].name);speakText('Tema cambiado a '+THEMES[idx].name);return;}
  }
  if(/bloquea|lock/.test(cmd)){lockAndShowAuth();speakText('Sistema bloqueado');return;}
  if(/notificaciones/.test(cmd)){toggleNotifCenter();return;}
  if(/voz\s*(off|apag)/.test(cmd)){voiceEnabled=false;showToast('🔊 Voz: OFF');return;}
  if(/voz\s*(on|encend)/.test(cmd)){voiceEnabled=true;showToast('🔊 Voz: ON');return;}

  // ── If nothing matched, send to MAX chat ──
  openApp('max-chat');
  setTimeout(()=>{
    const inp=document.getElementById('max-inp');
    if(inp){inp.value=cmd;sendMaxMsg();}
  },300);
}

// Mobile back
if(IS_MOB){
  window.addEventListener('popstate',()=>{
    if(drawerOpen){toggleAppDrawer();return;}
    const last=Object.keys(openWins).pop();
    if(last)closeApp(last);
  });
}
