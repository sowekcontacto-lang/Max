<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MaxOS · Sistema de Inteligencia Avanzada</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#000408;--deep:#010810;--panel:rgba(4,12,28,.96);--glass:rgba(5,14,30,.93);--surface:rgba(7,18,38,.9);
  --border:rgba(var(--cyan-rgb),.1);--border2:rgba(var(--cyan-rgb),.28);--border3:rgba(var(--cyan-rgb),.5);
  --cyan:#00eeff;--cyan2:#00bbdd;--cyan-rgb:0,238,255;--dark-rgb:0,6,16;
  --amber:#ffcc44;--red:#ff2244;--green:#00ffaa;--purple:#cc88ff;
  --text:#d8f4ff;--text2:#4a8aaa;--text3:#1a3a5a;
  --glow:0 0 24px rgba(var(--cyan-rgb),.45);
  --hglow:0 0 40px rgba(var(--cyan-rgb),.2),0 0 80px rgba(var(--cyan-rgb),.08);
  --win-radius:4px;--taskbar-h:46px;--mob-nav-h:54px;
}
html,body{height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:'Exo 2',sans-serif;user-select:none;-webkit-user-select:none;}

/* ═══ HOLOGRAPHIC BACKGROUND (overridden dynamically by applyTheme) ═══ */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;}
body::after{
  content:'';position:fixed;inset:0;z-index:1;
  background-size:52px 52px;animation:gridDrift 25s linear infinite;pointer-events:none;
  mask-image:radial-gradient(ellipse 95% 95% at 50% 50%,black 40%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 95% 95% at 50% 50%,black 40%,transparent 100%);
}
@keyframes gridDrift{to{background-position:52px 52px}}
.holo-scan{position:fixed;inset:0;z-index:2;pointer-events:none;background-size:100% 4px;animation:scanMove 10s linear infinite;}
@keyframes scanMove{from{background-position:0 0}to{background-position:0 100px}}
@media(max-width:768px){body::after{animation:none;background-image:none;}.holo-scan{display:none;}}

/* ═══ AUTH SCREEN ═══ */
#auth-screen{position:fixed;inset:0;z-index:9998;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.95);backdrop-filter:blur(40px);}
#auth-screen.vis{display:flex;}
.auth-box{width:min(360px,92vw);display:flex;flex-direction:column;align-items:center;gap:20px;}
.auth-logo{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;
  box-shadow:0 0 40px rgba(var(--cyan-rgb),.5);}
.auth-title{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;color:#fff;letter-spacing:.2em;text-align:center;}
.auth-sub{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--text3);letter-spacing:.18em;text-align:center;margin-top:-14px;}
.auth-tabs{display:flex;gap:0;width:100%;border:1px solid var(--border2);border-radius:4px;overflow:hidden;}
.auth-tab{flex:1;padding:9px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .2s;color:var(--text3);background:transparent;}
.auth-tab.active{background:rgba(var(--cyan-rgb),.12);color:var(--cyan);}
.auth-form{width:100%;display:flex;flex-direction:column;gap:10px;}
.auth-input{width:100%;background:rgba(var(--cyan-rgb),.04);border:1px solid var(--border);border-radius:4px;padding:11px 14px;color:var(--text);
  font-family:'Exo 2',sans-serif;font-size:.8rem;outline:none;transition:border-color .2s;}
.auth-input:focus{border-color:var(--border2);}
.auth-input::placeholder{color:var(--text3);}
.auth-btn{width:100%;padding:12px;border-radius:4px;border:1px solid var(--border2);background:rgba(var(--cyan-rgb),.1);
  color:var(--cyan);font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.1em;cursor:pointer;
  transition:all .2s;margin-top:4px;}
.auth-btn:hover{background:rgba(var(--cyan-rgb),.22);box-shadow:0 0 20px rgba(var(--cyan-rgb),.2);}
.auth-err{font-size:.62rem;color:var(--red);text-align:center;font-family:'Rajdhani',sans-serif;min-height:16px;}
.auth-user-info{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(var(--cyan-rgb),.05);
  border:1px solid var(--border);border-radius:4px;width:100%;cursor:pointer;}
.auth-user-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;color:#fff;}
.auth-user-name{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:700;color:var(--text);flex:1;}

/* ═══ MESSAGES APP ═══ */
.msgs-layout{display:flex;height:100%;}
.msgs-sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(0,0,0,.2);}
.msgs-sidebar-head{padding:12px 10px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.msgs-sidebar-head h3{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;color:var(--cyan);letter-spacing:.1em;text-transform:uppercase;}
.msgs-friend-list{flex:1;overflow-y:auto;}
.msgs-friend{display:flex;align-items:center;gap:8px;padding:9px 10px;cursor:pointer;transition:background .12s;border-bottom:1px solid rgba(var(--cyan-rgb),.04);}
.msgs-friend:hover{background:rgba(var(--cyan-rgb),.05);}
.msgs-friend.active{background:rgba(var(--cyan-rgb),.1);border-left:2px solid var(--cyan);}
.msgs-friend-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.72rem;color:#fff;flex-shrink:0;}
.msgs-friend-name{font-family:'Rajdhani',sans-serif;font-size:.66rem;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.msgs-friend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.msgs-convo{flex:1;display:flex;flex-direction:column;min-width:0;}
.msgs-convo-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.msgs-convo-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:7px;}
.msgs-bubble{max-width:72%;padding:8px 12px;border-radius:4px;font-size:.74rem;line-height:1.65;}
.msgs-bubble.me{align-self:flex-end;background:rgba(var(--cyan-rgb),.12);border-right:2px solid var(--cyan);color:var(--text);}
.msgs-bubble.them{align-self:flex-start;background:rgba(255,255,255,.04);border-left:2px solid var(--border2);color:var(--text);}
.msgs-bubble-time{font-size:.44rem;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.msgs-inp-wrap{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0;}
.msgs-inp{flex:1;background:rgba(var(--cyan-rgb),.03);border:1px solid var(--border);border-radius:3px;padding:7px 10px;color:var(--text);font-size:.74rem;outline:none;font-family:'Exo 2',sans-serif;}
.msgs-inp:focus{border-color:var(--border2);}
.msgs-send{padding:0 12px;border-radius:3px;border:none;background:rgba(var(--cyan-rgb),.2);color:var(--cyan);cursor:pointer;font-size:.85rem;transition:all .15s;}
.msgs-send:hover{background:rgba(var(--cyan-rgb),.35);}
.msgs-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--text3);}
.msgs-empty span:first-child{font-size:2.5rem;}
.msgs-empty span:last-child{font-family:'Rajdhani',sans-serif;font-size:.65rem;letter-spacing:.1em;}

/* ═══ FRIENDS APP ═══ */
.friends-wrap{padding:14px;display:flex;flex-direction:column;gap:12px;height:100%;overflow-y:auto;}
.friend-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(var(--cyan-rgb),.02);border:1px solid var(--border);border-radius:4px;}
.friend-card-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;color:#fff;flex-shrink:0;}
.friend-card-name{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;color:var(--text);flex:1;}
.friend-card-sub{font-size:.55rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.req-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,200,60,.04);border:1px solid rgba(255,200,60,.15);border-radius:4px;}background:#000408;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .8s,visibility .8s;}
#boot.hide{opacity:0;visibility:hidden;pointer-events:none;}
.boot-arc{width:88px;height:88px;border-radius:50%;
  background:radial-gradient(circle,#fff 0%,var(--cyan) 22%,rgba(var(--cyan-rgb),.25) 55%,transparent 100%);
  box-shadow:0 0 50px var(--cyan),0 0 100px rgba(var(--cyan-rgb),.5),0 0 200px rgba(var(--cyan-rgb),.18);
  position:relative;display:flex;align-items:center;justify-content:center;animation:arcPulse 1.8s ease-in-out infinite;}
.boot-arc::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(var(--cyan-rgb),.35);animation:arcRing 1.8s ease-in-out infinite;}
.boot-arc::after{content:'';position:absolute;inset:-11px;border-radius:50%;border:1px solid rgba(var(--cyan-rgb),.12);animation:arcRing 1.8s ease-in-out infinite .6s;}
.boot-core{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle,#fff,var(--cyan));box-shadow:0 0 20px #fff;}
@keyframes arcPulse{0%,100%{box-shadow:0 0 50px var(--cyan),0 0 100px rgba(var(--cyan-rgb),.4),0 0 200px rgba(var(--cyan-rgb),.12)}50%{box-shadow:0 0 70px var(--cyan),0 0 140px rgba(var(--cyan-rgb),.65),0 0 280px rgba(var(--cyan-rgb),.28)}}
@keyframes arcRing{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.75;transform:scale(1.06)}}
.boot-title{font-family:'Rajdhani',sans-serif;font-size:2.6rem;font-weight:700;letter-spacing:.35em;color:#fff;text-shadow:0 0 40px var(--cyan),0 0 80px rgba(var(--cyan-rgb),.4);}
.boot-sub{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--text3);letter-spacing:.18em;text-transform:uppercase;}
.boot-bar{width:240px;height:1px;background:rgba(var(--cyan-rgb),.1);position:relative;overflow:hidden;}
.boot-fill{height:100%;width:0%;background:linear-gradient(90deg,transparent,var(--cyan),#fff,var(--cyan),transparent);transition:width .35s;box-shadow:0 0 12px var(--cyan);}
.boot-status{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--text3);letter-spacing:.1em;}

/* ═══ LOCK SCREEN ═══ */
#lock{position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(var(--dark-rgb),.97);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);cursor:pointer;}
#lock.vis{display:flex;}
.lock-time{font-family:'Rajdhani',sans-serif;font-size:5.5rem;font-weight:200;color:#fff;letter-spacing:.05em;line-height:1;text-shadow:0 0 30px rgba(var(--cyan-rgb),.3);}
.lock-date{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:500;color:var(--text2);letter-spacing:.2em;text-transform:uppercase;}
.lock-hint{font-size:.58rem;color:var(--text3);letter-spacing:.25em;margin-top:24px;animation:lockBlink 2.5s ease-in-out infinite;}
@keyframes lockBlink{0%,100%{opacity:.3}50%{opacity:.7}}

/* ═══ DESKTOP ═══ */
#desktop{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;}
#desktop.vis{display:flex;}
#desktop-area{flex:1;position:relative;overflow:hidden;}
.di-ico{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  background:linear-gradient(135deg,rgba(var(--cyan-rgb),.1),rgba(var(--cyan-rgb),.03));
  border:1px solid rgba(var(--cyan-rgb),.12);box-shadow:0 3px 10px rgba(0,0,0,.4);transition:all .2s;}
.di:hover .di-ico{box-shadow:0 4px 20px rgba(var(--cyan-rgb),.22),0 0 8px rgba(var(--cyan-rgb),.08);border-color:rgba(var(--cyan-rgb),.3);}
.di-lbl{font-family:'Rajdhani',sans-serif;font-size:.56rem;font-weight:600;color:rgba(255,255,255,.82);letter-spacing:.04em;text-align:center;
  text-shadow:0 1px 6px rgba(0,0,0,.9);max-width:78px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ═══ TASKBAR ═══ */
#taskbar{height:var(--taskbar-h);background:rgba(var(--dark-rgb),.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(var(--cyan-rgb),.1);display:flex;align-items:center;padding:0 10px;gap:4px;z-index:500;flex-shrink:0;position:relative;}
#taskbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.35;}
.pc-mode #taskbar{display:flex;}
.mob-mode #taskbar{display:none;}
.tb-start{width:38px;height:34px;border-radius:3px;border:1px solid rgba(var(--cyan-rgb),.15);background:rgba(var(--cyan-rgb),.05);
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--cyan);font-size:.9rem;flex-shrink:0;}
.tb-start:hover{background:rgba(var(--cyan-rgb),.14);box-shadow:var(--glow);}
.tb-div{width:1px;height:22px;background:rgba(var(--cyan-rgb),.08);margin:0 5px;flex-shrink:0;}
.tb-apps{flex:1;display:flex;gap:3px;overflow:hidden;}
.tb-app{height:34px;padding:0 12px;border-radius:3px;border:none;background:transparent;color:var(--text2);cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:600;letter-spacing:.06em;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;}
.tb-app:hover{background:rgba(255,255,255,.04);}
.tb-app.active{background:rgba(var(--cyan-rgb),.07);color:var(--cyan);border-bottom:1px solid var(--cyan);}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.tb-theme-btn{width:34px;height:34px;border-radius:3px;border:1px solid rgba(255,200,80,.2);background:rgba(255,200,80,.04);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s;flex-shrink:0;}
.tb-theme-btn:hover{background:rgba(255,200,80,.1);}
.tb-clock{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:500;color:var(--text2);letter-spacing:.05em;text-align:right;line-height:1.3;}

/* ═══ MOBILE NAV ═══ */
#mobnav{height:var(--mob-nav-h);background:rgba(var(--dark-rgb),.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(var(--cyan-rgb),.1);display:none;align-items:center;justify-content:space-around;z-index:500;flex-shrink:0;padding:0 12px;}
.mob-mode #mobnav{display:flex;}
.mn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;padding:5px 0;transition:color .15s;}
.mn-btn.active{color:var(--cyan);}
.mn-btn span:first-child{font-size:1.15rem;}
.mn-btn span:last-child{font-family:'Rajdhani',sans-serif;font-size:.48rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}

/* ═══ WINDOWS — HOLOGRAPHIC HUD ═══ */
.app-win{
  position:absolute;z-index:100;display:none;flex-direction:column;
  background:rgba(2,8,22,.95);
  border:1px solid rgba(var(--cyan-rgb),.15);
  border-radius:var(--win-radius);
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.8),0 0 0 1px rgba(var(--cyan-rgb),.04),inset 0 1px 0 rgba(var(--cyan-rgb),.05);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  min-width:280px;min-height:180px;transition:box-shadow .2s;
}
.app-win.vis{display:flex;}
.app-win.focused{
  z-index:200;
  border-color:rgba(var(--cyan-rgb),.3);
  box-shadow:0 12px 60px rgba(0,0,0,.9),0 0 0 1px rgba(var(--cyan-rgb),.08),0 0 40px rgba(var(--cyan-rgb),.1),inset 0 1px 0 rgba(var(--cyan-rgb),.1);
}
.app-win.maximized{border-radius:0!important;inset:0!important;width:100%!important;height:calc(100% - var(--taskbar-h))!important;}
.mob-mode .app-win.vis{position:fixed!important;inset:0!important;width:100%!important;height:100%!important;border-radius:0!important;z-index:600!important;}

/* Corner HUD brackets */
.app-win::before,.app-win::after{content:'';position:absolute;z-index:301;pointer-events:none;}
.app-win.focused::before{
  top:0;left:0;width:16px;height:16px;
  border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);
  border-radius:var(--win-radius) 0 0 0;
  box-shadow:0 0 8px rgba(var(--cyan-rgb),.5);
}
.app-win.focused::after{
  bottom:0;right:0;width:16px;height:16px;
  border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);
  border-radius:0 0 var(--win-radius) var(--win-radius);
  box-shadow:0 0 8px rgba(var(--cyan-rgb),.5);
}
.win-corner-tr,.win-corner-bl{position:absolute;z-index:301;pointer-events:none;display:none;}
.app-win.focused .win-corner-tr{display:block;top:0;right:0;width:16px;height:16px;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan);border-radius:0 var(--win-radius) 0 0;box-shadow:0 0 8px rgba(var(--cyan-rgb),.5);}
.app-win.focused .win-corner-bl{display:block;bottom:0;left:0;width:16px;height:16px;border-bottom:2px solid var(--cyan);border-left:2px solid var(--cyan);border-radius:0 0 0 var(--win-radius);box-shadow:0 0 8px rgba(var(--cyan-rgb),.5);}

/* Titlebar */
.win-bar{
  height:34px;display:flex;align-items:center;padding:0 10px;gap:7px;flex-shrink:0;cursor:default;position:relative;
  background:linear-gradient(180deg,rgba(var(--cyan-rgb),.07) 0%,rgba(0,0,0,.4) 100%);
  border-bottom:1px solid rgba(var(--cyan-rgb),.1);
}
.win-bar::after{content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--cyan-rgb),.35),transparent);}
.mob-mode .win-bar{height:42px;}
.win-bar-icon{font-size:.8rem;}
.win-bar-title{flex:1;font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;color:var(--cyan);letter-spacing:.12em;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 0 12px rgba(var(--cyan-rgb),.5);}
.win-btns{display:flex;gap:2px;}
.win-btn{width:26px;height:22px;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.win-btn:hover{background:rgba(255,255,255,.06);color:var(--text);}
.win-btn.cls:hover{background:rgba(255,34,68,.2);color:var(--red);}
.mob-mode .win-btn.min,.mob-mode .win-btn.max{display:none;}
.mob-mode .win-btn.cls{width:34px;height:34px;font-size:.85rem;}

/* Window body */
.win-body{flex:1;overflow:auto;position:relative;scrollbar-width:thin;scrollbar-color:rgba(var(--cyan-rgb),.15) transparent;}
.win-body::-webkit-scrollbar{width:3px;}
.win-body::-webkit-scrollbar-thumb{background:rgba(var(--cyan-rgb),.2);border-radius:1px;}

/* ═══ START MENU ═══ */
#start-menu{position:fixed;bottom:var(--taskbar-h);left:8px;width:330px;max-height:480px;z-index:600;display:none;flex-direction:column;
  background:rgba(2,8,22,.97);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(var(--cyan-rgb),.15);border-radius:6px;box-shadow:0 12px 60px rgba(0,0,0,.8),0 0 30px rgba(var(--cyan-rgb),.08);overflow:hidden;}
#start-menu.vis{display:flex;}
.sm-head{padding:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(var(--cyan-rgb),.08);}
.sm-av{width:38px;height:38px;border-radius:50%;background:radial-gradient(circle,var(--cyan),rgba(var(--cyan-rgb),.3));display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;color:#fff;font-size:.9rem;box-shadow:0 0 15px rgba(var(--cyan-rgb),.3);}
.sm-user{font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:600;color:var(--text);letter-spacing:.05em;}
.sm-search{margin:10px;background:rgba(var(--cyan-rgb),.04);border:1px solid rgba(var(--cyan-rgb),.1);border-radius:4px;padding:7px 12px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.72rem;outline:none;}
.sm-search::placeholder{color:var(--text3);}
.sm-search:focus{border-color:rgba(var(--cyan-rgb),.3);}
.sm-grid{flex:1;overflow-y:auto;padding:4px 8px 10px;display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.sm-app{display:flex;align-items:center;gap:8px;padding:9px;border-radius:4px;cursor:pointer;transition:background .12s;}
.sm-app:hover{background:rgba(var(--cyan-rgb),.06);}
.sm-app-ico{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.95rem;background:rgba(var(--cyan-rgb),.06);border:1px solid rgba(var(--cyan-rgb),.1);}
.sm-app-name{font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:600;color:var(--text2);letter-spacing:.04em;}

/* ═══ APP DRAWER (mobile) ═══ */
#app-drawer{position:fixed;inset:0;z-index:800;display:none;flex-direction:column;background:rgba(0,4,12,.97);backdrop-filter:blur(24px);}
#app-drawer.vis{display:flex;}
.drawer-handle{width:38px;height:3px;border-radius:2px;background:var(--text3);margin:10px auto 14px;}
.drawer-search{margin:0 14px 10px;background:rgba(var(--cyan-rgb),.04);border:1px solid rgba(var(--cyan-rgb),.1);border-radius:22px;padding:9px 16px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.8rem;outline:none;width:calc(100% - 28px);}
.drawer-search::placeholder{color:var(--text3);}
.drawer-grid{flex:1;overflow-y:auto;padding:6px 16px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-content:start;}
.drawer-app{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
.drawer-app-ico{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:linear-gradient(135deg,rgba(var(--cyan-rgb),.1),rgba(var(--cyan-rgb),.03));border:1px solid rgba(var(--cyan-rgb),.1);transition:transform .15s;}
.drawer-app:active .drawer-app-ico{transform:scale(.88);}
.drawer-app-name{font-family:'Rajdhani',sans-serif;font-size:.52rem;font-weight:600;color:var(--text2);letter-spacing:.03em;text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ═══ NOTIFICATION CENTER ═══ */
#notif-center{position:fixed;top:0;right:-310px;width:310px;height:100%;z-index:900;
  background:rgba(2,8,22,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-left:1px solid rgba(var(--cyan-rgb),.1);transition:right .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
#notif-center.open{right:0;}
.nc-head{padding:14px;border-bottom:1px solid rgba(var(--cyan-rgb),.08);display:flex;align-items:center;justify-content:space-between;}
.nc-head h3{font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.15em;color:var(--cyan);}
.nc-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.95rem;}
.nc-list{flex:1;overflow-y:auto;padding:10px;}
.nc-item{padding:10px;border:1px solid rgba(var(--cyan-rgb),.07);border-radius:4px;margin-bottom:7px;background:rgba(var(--cyan-rgb),.02);}
.nc-item-title{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;color:var(--text);margin-bottom:3px;}
.nc-item-body{font-size:.6rem;color:var(--text3);line-height:1.5;}
.nc-item-time{font-size:.48rem;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}

/* ═══ HUD SECTION HEADERS ═══ */
.hud-sec{font-family:'JetBrains Mono',monospace;font-size:.48rem;font-weight:700;letter-spacing:.22em;color:rgba(var(--cyan-rgb),.3);text-transform:uppercase;padding-bottom:5px;border-bottom:1px solid rgba(var(--cyan-rgb),.07);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.hud-sec::before{content:'';display:inline-block;width:12px;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);box-shadow:0 0 4px var(--cyan);}
.hud-stat{background:rgba(var(--cyan-rgb),.03);border:1px solid rgba(var(--cyan-rgb),.12);border-top-color:rgba(var(--cyan-rgb),.28);border-radius:3px;padding:8px 11px;position:relative;overflow:hidden;}
.hud-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--cyan-rgb),.5),transparent);}
.hud-stat-lbl{font-size:.44rem;font-weight:700;letter-spacing:.18em;color:rgba(var(--cyan-rgb),.3);text-transform:uppercase;margin-bottom:2px;font-family:'JetBrains Mono',monospace;}
.hud-stat-val{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;color:var(--cyan);text-shadow:0 0 8px rgba(var(--cyan-rgb),.5);}

/* ═══ COMMON APP STYLES ═══ */
.app-pad{padding:18px 20px;}
.app-inner{padding:16px 18px;display:flex;flex-direction:column;gap:12px;height:100%;}
.app-btn{padding:9px 18px;border-radius:3px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.67rem;letter-spacing:.08em;border:1px solid;transition:all .15s;}
.app-btn.primary{background:rgba(var(--cyan-rgb),.08);border-color:rgba(var(--cyan-rgb),.35);color:var(--cyan);}
.app-btn.primary:hover{background:rgba(var(--cyan-rgb),.18);box-shadow:0 0 16px rgba(var(--cyan-rgb),.2);}
.app-btn.success{background:rgba(0,255,170,.06);border-color:rgba(0,255,170,.3);color:var(--green);}
.app-btn.success:hover{background:rgba(0,255,170,.14);}
.app-btn.danger{background:rgba(255,34,68,.06);border-color:rgba(255,34,68,.3);color:var(--red);}
.app-btn.danger:hover{background:rgba(255,34,68,.14);}
.app-btn.amber{background:rgba(255,204,68,.06);border-color:rgba(255,204,68,.28);color:var(--amber);}
.app-btn.amber:hover{background:rgba(255,204,68,.14);}
.app-btn.cancel{background:none;border-color:rgba(var(--cyan-rgb),.08);color:var(--text3);}
.app-btn.cancel:hover{border-color:rgba(var(--cyan-rgb),.2);color:var(--text2);}
.app-input{width:100%;background:rgba(var(--cyan-rgb),.03);border:1px solid rgba(var(--cyan-rgb),.1);border-radius:3px;padding:8px 12px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.76rem;outline:none;transition:border-color .2s;}
.app-input:focus{border-color:rgba(var(--cyan-rgb),.38);}
.app-input::placeholder{color:var(--text3);}
.app-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(var(--cyan-rgb),.02);border:1px solid rgba(var(--cyan-rgb),.07);border-radius:4px;}
.app-row-lbl{font-family:'Rajdhani',sans-serif;font-size:.64rem;font-weight:600;color:var(--text2);letter-spacing:.05em;min-width:90px;}

/* ═══ MAX CHAT ═══ */
.chat-wrap{display:flex;flex-direction:column;height:100%;}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(var(--cyan-rgb),.1) transparent;}
.cmsg{display:flex;gap:8px;align-items:flex-start;animation:msgIn .3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.cmsg.user{flex-direction:row-reverse;}
.cmsg-av{width:27px;height:27px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.58rem;font-weight:700;font-family:'Rajdhani',sans-serif;}
.cmsg.bot .cmsg-av{background:rgba(var(--cyan-rgb),.08);border:1px solid rgba(var(--cyan-rgb),.2);color:var(--cyan);}
.cmsg.user .cmsg-av{background:rgba(var(--cyan-rgb),.12);border:1px solid rgba(var(--cyan-rgb),.3);color:var(--cyan);}
.cmsg-bub{max-width:78%;padding:9px 13px;border-radius:3px;font-size:.76rem;line-height:1.75;font-weight:300;}
.cmsg.bot .cmsg-bub{background:linear-gradient(135deg,rgba(var(--cyan-rgb),.04),transparent);border-left:2px solid rgba(var(--cyan-rgb),.2);color:var(--text);}
.cmsg.user .cmsg-bub{background:linear-gradient(135deg,rgba(var(--cyan-rgb),.1),rgba(var(--cyan-rgb),.04));border-right:2px solid rgba(var(--cyan-rgb),.35);color:#fff;}
.chat-inp-wrap{display:flex;gap:7px;padding:10px 12px;border-top:1px solid rgba(var(--cyan-rgb),.08);background:rgba(var(--cyan-rgb),.01);flex-shrink:0;align-items:flex-end;}
.chat-ta{flex:1;background:rgba(0,0,0,.25);border:1px solid rgba(var(--cyan-rgb),.15);border-radius:3px;padding:8px 12px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.78rem;outline:none;resize:none;max-height:90px;min-height:36px;line-height:1.4;}
.chat-ta::placeholder{color:var(--text3);}
.chat-ta:focus{border-color:rgba(var(--cyan-rgb),.35);}
.chat-web-btn{width:34px;height:34px;border-radius:3px;border:1px solid rgba(var(--cyan-rgb),.15);background:rgba(var(--cyan-rgb),.04);color:rgba(var(--cyan-rgb),.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s;flex-shrink:0;}
.chat-web-btn.on{border-color:rgba(0,255,170,.3);background:rgba(0,255,170,.05);color:var(--green);}
.chat-web-btn:hover{border-color:rgba(var(--cyan-rgb),.3);color:var(--cyan);}
.chat-send{width:34px;height:34px;border-radius:3px;border:none;background:linear-gradient(135deg,rgba(var(--cyan-rgb),.3),rgba(var(--cyan-rgb),.1));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;transition:all .15s;}
.chat-send:hover{box-shadow:0 0 16px rgba(var(--cyan-rgb),.3);}
.chat-attach{width:34px;height:34px;border-radius:3px;border:1px solid rgba(var(--cyan-rgb),.1);background:rgba(var(--cyan-rgb),.03);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;transition:all .15s;}
.chat-attach:hover{border-color:rgba(var(--cyan-rgb),.25);color:var(--text2);}

/* ═══ PC CONTROL ═══ */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px;}
.qa-btn{padding:7px 5px;background:rgba(var(--cyan-rgb),.03);border:1px solid rgba(var(--cyan-rgb),.1);color:var(--text2);border-radius:3px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.55rem;font-weight:700;letter-spacing:.04em;transition:all .15s;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qa-btn:hover{background:rgba(var(--cyan-rgb),.1);border-color:rgba(var(--cyan-rgb),.28);color:var(--cyan);}
.qa-btn:active{transform:scale(.94);background:rgba(var(--cyan-rgb),.18);}
.qa-btn.amber:hover{background:rgba(255,204,68,.1);border-color:rgba(255,204,68,.3);color:var(--amber);}
.qa-btn.red:hover{background:rgba(255,34,68,.1);border-color:rgba(255,34,68,.3);color:var(--red);}
.qa-btn.green:hover{background:rgba(0,255,170,.08);border-color:rgba(0,255,170,.3);color:var(--green);}
.qa-filters{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;}
.qa-filter{padding:3px 8px;background:rgba(var(--cyan-rgb),.03);border:1px solid rgba(var(--cyan-rgb),.08);color:var(--text3);border-radius:2px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;}
.qa-filter.active,.qa-filter:hover{background:rgba(var(--cyan-rgb),.1);border-color:rgba(var(--cyan-rgb),.28);color:var(--cyan);}
.device-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid rgba(var(--cyan-rgb),.07);border-radius:3px;margin-bottom:4px;cursor:pointer;transition:all .15s;}
.device-row:hover{border-color:rgba(var(--cyan-rgb),.2);background:rgba(var(--cyan-rgb),.03);}
.dev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dev-dot.on{background:var(--green);box-shadow:0 0 5px var(--green);}
.dev-dot.off{background:var(--text3);}
.dev-name{font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:600;color:var(--text2);flex:1;}
.pc-cmd-row{display:flex;gap:6px;}
.pc-cmd-inp{flex:1;background:rgba(var(--cyan-rgb),.03);border:1px solid rgba(var(--cyan-rgb),.1);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.62rem;padding:7px 10px;border-radius:3px;outline:none;transition:border-color .2s;}
.pc-cmd-inp:focus{border-color:rgba(var(--cyan-rgb),.35);}
.pc-cmd-inp::placeholder{color:var(--text3);}
.pc-send{background:rgba(var(--cyan-rgb),.08);border:1px solid rgba(var(--cyan-rgb),.28);color:var(--cyan);padding:0 12px;border-radius:3px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;transition:all .2s;white-space:nowrap;}
.pc-send:hover{background:rgba(var(--cyan-rgb),.18);}
.pc-cmd-result{margin-top:8px;padding:8px 10px;background:rgba(0,0,0,.35);border:1px solid rgba(var(--cyan-rgb),.08);border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--text3);max-height:120px;overflow-y:auto;white-space:pre-wrap;display:none;}

/* ═══ VISION / CAMERA ═══ */
.cam-preview{width:100%;aspect-ratio:16/9;background:#000;border-radius:3px;border:1px solid rgba(var(--cyan-rgb),.1);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.cam-preview video{width:100%;height:100%;object-fit:cover;}
.cam-preview-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text3);}
.cam-preview-placeholder span:first-child{font-size:2rem;}
.cam-preview-placeholder span:last-child{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:.1em;}
.cam-overlay{position:absolute;inset:0;pointer-events:none;}
.cam-overlay::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(transparent 48%,rgba(var(--cyan-rgb),.015) 50%,transparent 52%);background-size:100% 6px;animation:camScan 3s linear infinite;}
@keyframes camScan{from{background-position:0 0}to{background-position:0 100px}}

/* ═══ API KEYS ═══ */
.key-status{font-size:.52rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-left:6px;white-space:nowrap;}
.key-status.ok{color:var(--green);}

/* ═══ WEATHER ═══ */
.weather-wrap{padding:18px;text-align:center;display:flex;flex-direction:column;gap:12px;}
.weather-ico{font-size:3rem;margin:8px 0;}
.weather-city{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;color:var(--text2);letter-spacing:.1em;}
.weather-temp{font-family:'Rajdhani',sans-serif;font-size:3.5rem;font-weight:200;color:#fff;line-height:1;text-shadow:0 0 20px rgba(var(--cyan-rgb),.2);}
.weather-desc{font-size:.7rem;color:var(--text2);text-transform:capitalize;}
.weather-details{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.wd-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;background:rgba(var(--cyan-rgb),.02);border:1px solid rgba(var(--cyan-rgb),.07);border-radius:3px;}
.wd-lbl{font-size:.48rem;color:var(--text3);font-family:'Rajdhani',sans-serif;letter-spacing:.1em;text-transform:uppercase;}
.wd-val{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;color:var(--text);}

/* ═══ VOICE / TTS ═══ */
.voice-preset-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.vpc{background:rgba(var(--cyan-rgb),.03);border:1px solid rgba(var(--cyan-rgb),.1);border-radius:3px;padding:9px 8px;cursor:pointer;transition:all .2s;text-align:center;}
.vpc:hover{border-color:rgba(var(--cyan-rgb),.25);background:rgba(var(--cyan-rgb),.06);}
.vpc.active{border-color:var(--cyan);background:rgba(var(--cyan-rgb),.08);}
.vpc-icon{font-size:1.1rem;margin-bottom:4px;}
.vpc-name{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;color:var(--text);letter-spacing:.04em;}
.vpc-desc{font-size:.48rem;color:var(--text3);line-height:1.3;margin-top:2px;}
.voice-slider-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.vs-lbl{font-family:'Rajdhani',sans-serif;font-size:.58rem;font-weight:600;color:var(--text3);letter-spacing:.08em;min-width:28px;}
.vs-val{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:rgba(191,127,255,.6);min-width:30px;text-align:right;}
input[type=range]{flex:1;height:3px;accent-color:rgba(var(--cyan-rgb),.8);cursor:pointer;}

/* ═══ STORE ═══ */
.store-wrap{padding:16px;}
.store-hero{text-align:center;padding:16px 0 12px;}
.store-hero h2{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;letter-spacing:.12em;}
.store-hero p{font-size:.65rem;color:var(--text2);margin-top:3px;}
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:10px;}
.store-card{background:rgba(var(--cyan-rgb),.02);border:1px solid rgba(var(--cyan-rgb),.08);border-radius:6px;padding:14px;cursor:pointer;transition:all .2s;}
.store-card:hover{border-color:rgba(var(--cyan-rgb),.22);background:rgba(var(--cyan-rgb),.04);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.sc-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(var(--cyan-rgb),.08);border:1px solid rgba(var(--cyan-rgb),.1);margin-bottom:8px;}
.sc-name{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:700;color:var(--text);letter-spacing:.04em;}
.sc-desc{font-size:.58rem;color:var(--text3);margin-top:3px;line-height:1.4;}
.sc-badge{font-size:.44rem;padding:2px 5px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.06em;margin-top:7px;display:inline-block;}
.sc-badge.sys{background:rgba(var(--cyan-rgb),.06);border:1px solid rgba(var(--cyan-rgb),.15);color:var(--cyan);}
.sc-badge.ok{background:rgba(0,255,170,.06);border:1px solid rgba(0,255,170,.18);color:var(--green);}
.sc-badge.pend{background:rgba(255,204,68,.06);border:1px solid rgba(255,204,68,.18);color:var(--amber);}

/* ═══ TERMINAL ═══ */
.term-wrap{height:100%;display:flex;flex-direction:column;background:#000;padding:10px 12px;}
.term-out{flex:1;overflow-y:auto;white-space:pre-wrap;line-height:1.8;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:#00ff88;}
.term-row{display:flex;gap:6px;align-items:center;border-top:1px solid #0a1a0a;padding-top:7px;flex-shrink:0;}
.term-prompt{color:#00aa66;font-family:'JetBrains Mono',monospace;font-size:.62rem;white-space:nowrap;}
.term-inp{flex:1;background:none;border:none;color:#00ff88;font-family:'JetBrains Mono',monospace;font-size:.62rem;outline:none;}

/* ═══ MAPS ═══ */
.maps-wrap{display:flex;flex-direction:column;height:100%;}
.maps-bar{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid rgba(var(--cyan-rgb),.08);flex-shrink:0;}
.maps-bar input{flex:1;background:rgba(var(--cyan-rgb),.03);border:1px solid rgba(var(--cyan-rgb),.1);border-radius:18px;padding:6px 14px;color:var(--text);font-size:.72rem;outline:none;font-family:'Exo 2',sans-serif;}
.maps-bar input::placeholder{color:var(--text3);}
.maps-bar button{padding:6px 14px;border-radius:18px;border:1px solid rgba(var(--cyan-rgb),.25);background:rgba(var(--cyan-rgb),.07);color:var(--cyan);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;white-space:nowrap;}
.maps-iframe{flex:1;border:none;background:var(--void);}

/* ═══ THEME MODAL ═══ */
#theme-modal{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.88);align-items:center;justify-content:center;}
#theme-modal.vis{display:flex;}
.theme-box{background:rgba(2,8,22,.98);border:1px solid rgba(var(--cyan-rgb),.2);border-radius:6px;padding:26px;max-width:420px;width:92%;box-shadow:0 0 60px rgba(var(--cyan-rgb),.1);}
.theme-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--cyan);letter-spacing:.15em;margin-bottom:16px;}
.theme-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.theme-swatch{aspect-ratio:1;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;display:flex;align-items:center;justify-content:center;}
.theme-swatch:hover{transform:scale(1.15);border-color:rgba(255,255,255,.3);}
.theme-swatch.active{border-color:#fff;transform:scale(1.1);}
.theme-swatch.active::after{content:'✓';color:#fff;font-size:.75rem;font-weight:700;text-shadow:0 0 6px rgba(0,0,0,.8);}
.theme-lbl{font-family:'Rajdhani',sans-serif;font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-align:center;margin-top:3px;}

/* ═══ PUBLISH MODAL ═══ */
#pub-modal{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.88);align-items:center;justify-content:center;}
#pub-modal.vis{display:flex;}
.pub-box{background:rgba(2,8,22,.98);border:1px solid rgba(var(--cyan-rgb),.18);border-radius:6px;padding:24px;max-width:480px;width:92%;max-height:82vh;overflow-y:auto;}
.pub-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--cyan);letter-spacing:.1em;margin-bottom:14px;}
.pub-field{margin-bottom:12px;}
.pub-label{font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:600;color:var(--text2);letter-spacing:.06em;margin-bottom:4px;display:block;}
.pub-textarea{width:100%;background:rgba(var(--cyan-rgb),.02);border:1px solid rgba(var(--cyan-rgb),.1);border-radius:3px;padding:9px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.65rem;outline:none;min-height:160px;resize:vertical;}
.pub-textarea:focus{border-color:rgba(var(--cyan-rgb),.3);}

/* ═══ TOAST ═══ */
#os-toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(18px);
  background:rgba(2,8,22,.97);border:1px solid rgba(var(--cyan-rgb),.25);border-radius:4px;
  padding:9px 18px;font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:600;color:var(--cyan);letter-spacing:.06em;
  z-index:10001;opacity:0;transition:all .28s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.5);}
#os-toast.vis{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(var(--cyan-rgb),.15);border-radius:1px;}
::-webkit-scrollbar-track{background:transparent;}

/* ═══ ICON DRAG ═══ */
#desktop-icons{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;}
.di{position:absolute;display:flex;flex-direction:column;align-items:center;gap:5px;padding:7px;border-radius:4px;cursor:grab;transition:background .15s, border-color .15s;border:1px solid transparent;width:82px;user-select:none;}
.di:active{cursor:grabbing;}
.di.drag-over{border-color:rgba(var(--cyan-rgb),.4);background:rgba(var(--cyan-rgb),.08);}

/* ═══ VOICE CONTROL ═══ */
#voice-ctrl-btn{position:fixed;bottom:calc(var(--taskbar-h) + 10px);right:14px;width:42px;height:42px;border-radius:50%;background:rgba(var(--dark-rgb),.95);border:1px solid rgba(var(--cyan-rgb),.2);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;z-index:490;transition:all .2s;box-shadow:0 2px 14px rgba(0,0,0,.6);}
#voice-ctrl-btn.active{border-color:var(--red);color:var(--red);box-shadow:0 0 18px rgba(255,34,68,.35);animation:vcPulse 1.4s ease-in-out infinite;}
@keyframes vcPulse{0%,100%{box-shadow:0 0 18px rgba(255,34,68,.25)}50%{box-shadow:0 0 30px rgba(255,34,68,.55)}}
#voice-ctrl-btn.listening{border-color:var(--green);color:var(--green);box-shadow:0 0 18px rgba(0,255,170,.35);animation:vcListen 1s ease-in-out infinite;}
@keyframes vcListen{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.mob-mode #voice-ctrl-btn{bottom:calc(var(--mob-nav-h) + 10px);}

/* ═══ MODEL SELECTOR ═══ */
.provider-card{padding:10px 12px;background:rgba(var(--cyan-rgb),.02);border:1px solid rgba(var(--cyan-rgb),.08);border-radius:4px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.provider-card:hover{border-color:rgba(var(--cyan-rgb),.2);}
.provider-card.active{border-color:var(--cyan);background:rgba(var(--cyan-rgb),.06);}
.provider-radio{width:12px;height:12px;border-radius:50%;border:2px solid var(--text3);flex-shrink:0;transition:all .15s;}
.provider-card.active .provider-radio{border-color:var(--cyan);background:var(--cyan);box-shadow:0 0 6px rgba(var(--cyan-rgb),.5);}
.provider-name{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;color:var(--text);flex:1;}
.provider-badge{font-size:.45rem;padding:2px 5px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.06em;}
.provider-badge.free{background:rgba(0,255,170,.06);border:1px solid rgba(0,255,170,.2);color:var(--green);}
.provider-badge.paid{background:rgba(255,200,60,.06);border:1px solid rgba(255,200,60,.2);color:var(--amber);}
.key-link{font-size:.52rem;color:var(--cyan);text-decoration:none;font-family:'Rajdhani',sans-serif;letter-spacing:.04em;}
.key-link:hover{text-decoration:underline;}

/* ═══ SETTINGS APP ═══ */
.settings-wrap{padding:18px;display:flex;flex-direction:column;gap:16px;}
.settings-sec{margin-bottom:4px;}
.settings-sec-title{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;color:var(--cyan);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid rgba(var(--cyan-rgb),.08);}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .store-grid{grid-template-columns:1fr 1fr;}
  .weather-details{grid-template-columns:repeat(2,1fr);}

}

const USER_COLORS = ['#00eeff','#ff64c8','#00ff88','#ffcc44','#ff5050','#b464ff','#ff8c00','#00d2b4'];

function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return Math.abs(h);}
function userColor(username){return USER_COLORS[hashStr(username)%USER_COLORS.length];}
function userInitial(name){return (name||'?')[0].toUpperCase();}
function simpleHash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))|0;return (h>>>0).toString(36);}

async function quickLogin(username, ph){
  setAuthErr('');
  try {
    const r=await fetch(`${FB_URL}${USERS_PATH}/${username}.json?auth=${FB_SECRET}`,{signal:AbortSignal.timeout(6000)});
    if(!r.ok)throw new Error('Error de red');
    const data=await r.json();
    if(!data)throw new Error('Usuario no encontrado');
    if(data.passwordHash!==ph)throw new Error('Sesión inválida');
    loginSuccess(username,data);
  } catch(e){setAuthErr(e.message);}
}

function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('auth-login-form').style.display=tab==='login'?'flex':'none';
  document.getElementById('auth-register-form').style.display=tab==='register'?'flex':'none';
  setAuthErr('');
}

function setAuthErr(msg){const el=document.getElementById('auth-err');if(el)el.textContent=msg;}

async function doLogin(){
  const u=(document.getElementById('auth-l-user')?.value||'').trim().toLowerCase();
  const p=document.getElementById('auth-l-pass')?.value||'';
  if(!u||!p){setAuthErr('Completá todos los campos');return;}
  setAuthErr('Verificando...');
  try {
    const r=await fetch(`${FB_URL}${USERS_PATH}/${u}.json?auth=${FB_SECRET}`,{signal:AbortSignal.timeout(7000)});
    if(!r.ok)throw new Error('Error de red');
    const data=await r.json();
    if(!data)throw new Error('Usuario no encontrado');
    const ph=simpleHash(p+u);
    if(data.passwordHash!==ph)throw new Error('Contraseña incorrecta');
    loginSuccess(u,data);
  } catch(e){setAuthErr(e.message);}
}

async function doRegister(){
  const u=(document.getElementById('auth-r-user')?.value||'').trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const dn=(document.getElementById('auth-r-display')?.value||'').trim();
  const p=document.getElementById('auth-r-pass')?.value||'';
  const p2=document.getElementById('auth-r-pass2')?.value||'';
  if(!u||!p||!dn){setAuthErr('Completá todos los campos');return;}
  if(u.length<3){setAuthErr('Usuario mínimo 3 caracteres');return;}
  if(p.length<4){setAuthErr('Contraseña mínimo 4 caracteres');return;}
  if(p!==p2){setAuthErr('Las contraseñas no coinciden');return;}
  setAuthErr('Creando cuenta...');
  try {
    const check=await fetch(`${FB_URL}${USERS_PATH}/${u}.json?auth=${FB_SECRET}`,{signal:AbortSignal.timeout(6000)});
    if((await check.json())!==null){setAuthErr('Ese usuario ya existe');return;}
    const ph=simpleHash(p+u);
    const profileId='u_'+u+'_'+Date.now().toString(36);
    const userData={username:u,displayName:dn,passwordHash:ph,profileId,color:userColor(u),created:Date.now()};
    await fetch(`${FB_URL}${USERS_PATH}/${u}.json?auth=${FB_SECRET}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(userData)});
    loginSuccess(u,userData);
  } catch(e){setAuthErr('Error: '+e.message);}
}

function loginSuccess(username, data){
  currentUser={username,displayName:data.displayName||username,profileId:data.profileId||('u_'+username),color:data.color||userColor(username)};
  // Save session
  const ph=data.passwordHash;
  const sessions=JSON.parse(localStorage.getItem('maxos_sessions')||'[]').filter(s=>s.username!==username);
  sessions.unshift({username,displayName:data.displayName||username,ph});
  localStorage.setItem('maxos_sessions',JSON.stringify(sessions.slice(0,5)));
  // Update PROFILE_ID
  PROFILE_ID=currentUser.profileId;
  localStorage.setItem('maxos_profile_id',PROFILE_ID);
  // Hide auth, show desktop
  document.getElementById('auth-screen').classList.remove('vis');
  initDesktop();
  addNotif('MaxOS',`Bienvenido, ${currentUser.displayName}! 👋`);
}

let iconPositions = JSON.parse(localStorage.getItem('maxos_icon_pos')||'{}');
// Reset positions that are clearly wrong (all icons bunched at y<20 = old layout bug)
(function validateIconPositions(){
  const vals = Object.values(iconPositions);
  if(vals.length > 3 && vals.filter(p=>p.y < 20).length > vals.length * 0.7) {
    // More than 70% of icons are at y<20 → old horizontal layout, reset all
    iconPositions = {};
    localStorage.removeItem('maxos_icon_pos');
  }
})();
let iconDrag = null;

function getDefaultPos(idx) {
  if(IS_MOB){
    const cols=Math.max(1,Math.floor((window.innerWidth-12)/94));
    return{x:6+(idx%cols)*94,y:10+Math.floor(idx/cols)*100};
  }
  // Desktop: vertical columns from top-left (like Windows/Linux)
  const rowsPerCol=Math.max(1,Math.floor((window.innerHeight-80)/100));
  const col=Math.floor(idx/rowsPerCol),row=idx%rowsPerCol;
  return{x:14+col*96,y:14+row*100};
}

function saveIconPositions() {
  localStorage.setItem('maxos_icon_pos', JSON.stringify(iconPositions));
}

// ═══ RENDER ICONS ═══
function renderDesktopIcons(){
  const c=document.getElementById('desktop-icons');c.innerHTML='';
  const apps=[...SYS_APPS,...communityApps.filter(a=>a.status==='approved')];
  apps.forEach((app,idx)=>{
    const pos = iconPositions[app.id] || getDefaultPos(idx);
    if(!iconPositions[app.id]) { iconPositions[app.id]=pos; }
    const el=document.createElement('div');
    el.className='di';el.id='di-'+app.id;
    el.style.cssText=`left:${pos.x}px;top:${pos.y}px;`;
    el.innerHTML=`<div class="di-ico">${app.icon}</div><div class="di-lbl">${app.name}</div>`;
    el.addEventListener('click',()=>openApp(app.id));
    el.addEventListener('mousedown',(e)=>startIconDrag(e,app.id,el));
    el.addEventListener('touchstart',(e)=>startIconDragTouch(e,app.id,el),{passive:true});
    c.appendChild(el);
  });
}

function startIconDrag(e, id, el) {
  if(e.button!==0) return;
  const rect=el.getBoundingClientRect();
  iconDrag={id,el,ox:e.clientX-rect.left,oy:e.clientY-rect.top,moved:false,startX:e.clientX,startY:e.clientY};
  e.preventDefault();
}
function startIconDragTouch(e, id, el) {
  const t=e.touches[0];const rect=el.getBoundingClientRect();
  iconDrag={id,el,ox:t.clientX-rect.left,oy:t.clientY-rect.top,moved:false,startX:t.clientX,startY:t.clientY,isTouch:true};
}

document.addEventListener('mousemove',e=>{
  if(!iconDrag)return;
  const dx=Math.abs(e.clientX-iconDrag.startX),dy=Math.abs(e.clientY-iconDrag.startY);
  if(dx>5||dy>5)iconDrag.moved=true;
  if(!iconDrag.moved)return;
  const area=document.getElementById('desktop-area');
  if(!area)return;
  const ar=area.getBoundingClientRect();
  const x=Math.max(0,Math.min(e.clientX-iconDrag.ox-ar.left,ar.width-82));
  const y=Math.max(0,Math.min(e.clientY-iconDrag.oy-ar.top,ar.height-100));
  iconDrag.el.style.left=x+'px';iconDrag.el.style.top=y+'px';
  iconDrag.el.style.zIndex=999;iconDrag.el.style.opacity='.8';
});
document.addEventListener('mouseup',e=>{
  if(!iconDrag)return;
  if(iconDrag.moved){
    const area=document.getElementById('desktop-area');
    if(area){const ar=area.getBoundingClientRect();
      const x=parseFloat(iconDrag.el.style.left),y=parseFloat(iconDrag.el.style.top);
      iconPositions[iconDrag.id]={x,y};saveIconPositions();}
    iconDrag.el.style.zIndex='';iconDrag.el.style.opacity='';
  }
  iconDrag=null;
});

function openApp(appId){
  if(openWins[appId]){focusApp(appId);return;}
  const app=[...SYS_APPS,...communityApps].find(a=>a.id===appId);
  if(!app)return;
  const win=document.createElement('div');
  win.className='app-win vis focused';win.id='win-'+appId;win.style.zIndex=++winZ;
  if(!IS_MOB){
    const w=Math.min(820,window.innerWidth-60),h=Math.min(580,window.innerHeight-100);
    const x=38+Object.keys(openWins).length*28,y=28+Object.keys(openWins).length*22;
    win.style.cssText+=`;width:${w}px;height:${h}px;left:${x}px;top:${y}px;`;
  }
  win.innerHTML=`
    <div class="win-corner-tr"></div><div class="win-corner-bl"></div>
    <div class="win-bar" onmousedown="startDrag(event,'${appId}')">
      <span class="win-bar-icon">${app.icon}</span>
      <span class="win-bar-title">${app.name}</span>
      <div class="win-btns">
        <button class="win-btn min" onclick="minimizeApp('${appId}')">─</button>
        <button class="win-btn max" onclick="maximizeApp('${appId}')">☐</button>
        <button class="win-btn cls" onclick="closeApp('${appId}')">✕</button>
      </div>
    </div>
    <div class="win-body" id="wb-${appId}"></div>`;
  document.getElementById('desktop-area').appendChild(win);
  win.addEventListener('mousedown',()=>focusApp(appId));
  openWins[appId]={el:win,min:false,max:false};focusWin=appId;
  updateTaskbar();renderAppContent(appId);
}
function closeApp(id){const w=openWins[id];if(!w)return;w.el.remove();delete openWins[id];if(focusWin===id)focusWin=Object.keys(openWins).pop()||null;updateTaskbar();}
function minimizeApp(id){const w=openWins[id];if(!w)return;w.min=true;w.el.style.display='none';updateTaskbar();}
function maximizeApp(id){const w=openWins[id];if(!w)return;w.max=!w.max;w.el.classList.toggle('maximized',w.max);}
function focusApp(id){
  Object.values(openWins).forEach(w=>{w.el.classList.remove('focused');});
  const w=openWins[id];if(!w)return;
  if(w.min){w.min=false;w.el.style.display='flex';}
  w.el.style.zIndex=++winZ;w.el.classList.add('focused');focusWin=id;updateTaskbar();
}

function updateTaskbar(){

// ═══ DRAG ═══
let drag=null;
function startDrag(e,id){if(IS_MOB)return;const w=openWins[id];if(!w||w.max)return;const r=w.el.getBoundingClientRect();drag={id,sx:e.clientX-r.left,sy:e.clientY-r.top};e.preventDefault();}
document.addEventListener('mousemove',e=>{if(!drag)return;const w=openWins[drag.id];if(!w)return;w.el.style.left=(e.clientX-drag.sx)+'px';w.el.style.top=(e.clientY-drag.sy)+'px';});
document.addEventListener('mouseup',()=>{drag=null;});

function addNotif(title,body){
  const l=document.getElementById('nc-list'),n=new Date();
  const el=document.createElement('div');el.className='nc-item';
  el.innerHTML=`<div class="nc-item-title">${title}</div><div class="nc-item-body">${body}</div><div class="nc-item-time">${pad(n.getHours())}:${pad(n.getMinutes())}</div>`;
  l.insertBefore(el,l.firstChild);
}
function showToast(msg,dur=3000){const el=document.getElementById('os-toast');el.textContent=msg;el.classList.add('vis');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('vis'),dur);}

// Click outside menus
document.addEventListener('click',e=>{
  if(startOpen&&!e.target.closest('#start-menu')&&!e.target.closest('.tb-start')){startOpen=false;document.getElementById('start-menu').classList.remove('vis');}
  if(notifOpen&&!e.target.closest('#notif-center')&&!e.target.closest('[onclick*="toggleNotifCenter"]')){notifOpen=false;document.getElementById('notif-center').classList.remove('open');}
});

function renderAppContent(id){
  const body=document.getElementById('wb-'+id);if(!body)return;
  switch(id){
    case 'max-chat':   renderMaxChat(body);break;
    case 'messages':   renderMessages(body);break;
    case 'friends':    renderFriends(body);break;
    case 'pc-control': renderPCControl(body);break;
    case 'vision':     renderVision(body);break;
    case 'voice':      renderVoice(body);break;
    case 'api-keys':   renderAPIKeys(body);break;
    case 'weather':    renderWeather(body);break;
    case 'maps':       renderMaps(body);break;
    case 'store':      renderStore(body);break;
    case 'files':      renderFiles(body);break;
    case 'terminal':   renderTerminal(body);break;
    case 'settings':   renderSettings(body);break;

  }
}

        <div class="friend-card">
          <div class="friend-card-av" style="background:${userColor(u)};">${userInitial(v.displayName||u)}</div>

            <div class="friend-card-name">${escapeHTML(v.displayName||u)}</div>

            <div class="friend-card-sub">@${escapeHTML(u)}</div>

async function sendFriendRequest(){
  const inp=document.getElementById('friend-search-inp');
  const target=(inp?.value||'').trim().toLowerCase().replace('@','');
  if(!target||target===currentUser.username){showToast('⚠️ Usuario inválido');return;}
  try {
    // Check user exists
    const r=await fetch(`${FB_URL}${USERS_PATH}/${target}.json?auth=${FB_SECRET}`,{signal:AbortSignal.timeout(5000)});
    const data=await r.json();
    if(!data){showToast('❌ Usuario no encontrado');return;}
    // Send request to target
    const reqData={status:'pending',from:currentUser.username,displayName:currentUser.displayName,ts:Date.now()};
    await fetch(`${FB_URL}${FRIENDS_PATH}/${target}/${currentUser.username}.json?auth=${FB_SECRET}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(reqData)});
    // Record that I sent it
    await fetch(`${FB_URL}${FRIENDS_PATH}/${currentUser.username}/${target}.json?auth=${FB_SECRET}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'pending',from:currentUser.username,displayName:data.displayName||target,ts:Date.now()})});
    if(inp)inp.value='';
    showToast(`✅ Solicitud enviada a @${target}`);
    await refreshFriends();
  } catch(e){showToast('❌ Error: '+e.message);}
}

async function acceptFriend(username, displayName){
  const accepted={status:'accepted',displayName,ts:Date.now()};
  const myEntry={status:'accepted',displayName:currentUser.displayName,ts:Date.now()};
  await fetch(`${FB_URL}${FRIENDS_PATH}/${currentUser.username}/${username}.json?auth=${FB_SECRET}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(accepted)});
  await fetch(`${FB_URL}${FRIENDS_PATH}/${username}/${currentUser.username}.json?auth=${FB_SECRET}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(myEntry)});
  showToast(`🎉 ¡${displayName} es tu amigo!`);
  addNotif('Amigos',`Aceptaste la solicitud de ${displayName}`);
  await refreshFriends();
}

async function rejectFriend(username){
  await fetch(`${FB_URL}${FRIENDS_PATH}/${currentUser.username}/${username}.json?auth=${FB_SECRET}`,{method:'DELETE'});
  await fetch(`${FB_URL}${FRIENDS_PATH}/${username}/${currentUser.username}.json?auth=${FB_SECRET}`,{method:'DELETE'});
  showToast('Solicitud rechazada');await refreshFriends();
}
async function cancelFriendReq(username){await rejectFriend(username);}

function openMsgWith(username, displayName){
  openApp('messages');
  setTimeout(()=>selectConversation(username,displayName),300);
}

function convId(a,b){return [a,b].sort().join('__');}

async function selectConversation(username, displayName){
  msgsCurrentFriend={username,displayName};
  // Highlight sidebar
  document.querySelectorAll('.msgs-friend').forEach(el=>el.classList.remove('active'));
  const mf=document.getElementById('mf-'+username);if(mf)mf.classList.add('active');
  // Render convo panel
  const cv=document.getElementById('msgs-convo');if(!cv)return;
  cv.innerHTML=`
    <div class="msgs-convo-head">
      <div class="msgs-friend-av" style="background:${userColor(username)};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.72rem;color:#fff;">${userInitial(displayName)}</div>
      <div style="flex:1;">
        <div style="font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:700;color:var(--text);">${escapeHTML(displayName)}</div>
        <div style="font-size:.5rem;color:var(--text3);font-family:'JetBrains Mono',monospace;">@${escapeHTML(username)}</div>
      </div>
      <button class="app-btn cancel" style="font-size:.55rem;padding:4px 8px;" onclick="openApp('friends')">👥 Ver perfil</button>
    </div>
    <div class="msgs-convo-msgs" id="msgs-msgs-list"></div>
    <div class="msgs-inp-wrap">
      <input class="msgs-inp" id="msgs-inp" placeholder="Escribí un mensaje..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="msgs-send" onclick="sendMsg()">▶</button>
    </div>`;
  if(msgsPollTimer)clearInterval(msgsPollTimer);
  await loadMessages();
  msgsPollTimer=setInterval(loadMessages,3500);
}

async function loadMessages(){
  if(!msgsCurrentFriend||!currentUser)return;
  const cid=convId(currentUser.username,msgsCurrentFriend.username);
  const c=document.getElementById('msgs-msgs-list');if(!c)return;
  try {
    const r=await fetch(`${FB_URL}${MSGS_PATH}/${cid}.json?auth=${FB_SECRET}&orderBy="ts"&limitToLast=60`,{signal:AbortSignal.timeout(5000)});
    if(!r.ok)return;
    const data=await r.json();
    if(!data){c.innerHTML=`<div style="color:var(--text3);font-size:.65rem;font-family:'Rajdhani',sans-serif;text-align:center;padding:20px;">Sin mensajes aún. ¡Decí hola! 👋</div>`;return;}
    const msgs=Object.values(data).sort((a,b)=>a.ts-b.ts);
    const atBottom=c.scrollHeight-c.scrollTop-c.clientHeight<60;
    c.innerHTML=msgs.map(m=>{
      const isMe=m.from===currentUser.username;
      const d=new Date(m.ts);
      return `<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'};">
        <div class="msgs-bubble ${isMe?'me':'them'}">${escapeHTML(m.text)}</div>
        <div class="msgs-bubble-time">${pad(d.getHours())}:${pad(d.getMinutes())}</div>
      </div>`;
    }).join('');
    if(atBottom)c.scrollTop=c.scrollHeight;
  } catch(e){}
}

async function sendMsg(){
  if(!msgsCurrentFriend||!currentUser)return;
  const inp=document.getElementById('msgs-inp');
  const text=(inp?.value||'').trim();if(!text)return;
  inp.value='';
  const cid=convId(currentUser.username,msgsCurrentFriend.username);
  const msg={from:currentUser.username,text,ts:Date.now()};
  try {
    await fetch(`${FB_URL}${MSGS_PATH}/${cid}.json?auth=${FB_SECRET}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(msg)});
    await loadMessages();
  } catch(e){showToast('❌ Error al enviar');}
}

let pendingFile = null;
function handleChatFile(input) {
  const file = input.files[0]; if(!file) return;
  const prev = document.getElementById('chat-file-preview');
  if(file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => {
      pendingFile = {type:'image',data:e.target.result,name:file.name};
      prev.innerHTML=`<div style="position:relative;"><img src="${e.target.result}" style="height:40px;border-radius:3px;border:1px solid rgba(var(--cyan-rgb),.2);"><button onclick="pendingFile=null;document.getElementById('chat-file-preview').innerHTML=''" style="position:absolute;top:-4px;right:-4px;background:rgba(255,34,68,.8);border:none;color:#fff;border-radius:50%;width:14px;height:14px;cursor:pointer;font-size:.5rem;display:flex;align-items:center;justify-content:center;">✕</button></div>`;
    };
    reader.readAsDataURL(file);
  } else {
    const reader = new FileReader();
    reader.onload = e => {
      pendingFile = {type:'text',data:e.target.result,name:file.name};
      prev.innerHTML=`<div style="padding:4px 8px;background:rgba(var(--cyan-rgb),.06);border:1px solid rgba(var(--cyan-rgb),.15);border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--cyan);display:flex;align-items:center;gap:6px;">📄 ${escapeHTML(file.name)}<button onclick="pendingFile=null;document.getElementById('chat-file-preview').innerHTML=''" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:.7rem;">✕</button></div>`;
    };
    reader.readAsText(file);
  }
}

async function sendMaxMsg() {
  const inp = document.getElementById('max-inp'), msgs = document.getElementById('max-msgs');
  if(!inp||!msgs) return;
  const text = inp.value.trim(); if(!text && !pendingFile) return;
  inp.value = '';
  const file = pendingFile; pendingFile = null;
  if(document.getElementById('chat-file-preview')) document.getElementById('chat-file-preview').innerHTML='';

  const userEl = document.createElement('div');
  userEl.className='cmsg user';
  userEl.innerHTML=`<div class="cmsg-av">U</div><div class="cmsg-bub">${file?`<span style="font-size:.7rem;color:var(--text3)">[${file.name}]</span><br>`:''}${escapeHTML(text)}</div>`;
  msgs.appendChild(userEl);msgs.scrollTop=msgs.scrollHeight;

  const botEl=document.createElement('div');botEl.className='cmsg bot';
  botEl.innerHTML=`<div class="cmsg-av">M</div><div class="cmsg-bub" id="max-thinking"><span style="color:var(--text3);animation:lockBlink 1s infinite;">Procesando...</span></div>`;
  msgs.appendChild(botEl);msgs.scrollTop=msgs.scrollHeight;

  chatHistory.push({role:'user',content:text||'[archivo adjunto]'});

  const provId = KEYS.activeProvider || 'groq';
  const prov = AI_PROVIDERS[provId];
  const key = KEYS[prov.keyName];
  if(!key){document.getElementById('max-thinking').innerHTML=`<span style="color:var(--amber)">⚠️ Necesitás la API key de <strong>${prov.name}</strong>. Abrí 🔑 API Keys.</span>`;return;}

  let messages = [
    {role:'system',content:`Sos MAX, un asistente con inteligencia extrema. Respondé directo, sin floro. Trato de igual a igual. Nunca digas "Por supuesto" o "Como asistente de IA". Fecha: ${new Date().toLocaleDateString('es')}. ${webSearchOn?'[WEB ACTIVO — mencioná que podés buscar en web cuando sea relevante]':''}`},
    ...chatHistory.slice(-10)
  ];

  if(file?.type==='image') {
    messages[messages.length-1]={role:'user',content:[{type:'image_url',image_url:{url:file.data}},{type:'text',text:text||'Analizá esta imagen.'}]};
  } else if(file?.type==='text') {
    messages[messages.length-1].content+=`\n\n[Archivo: ${file.name}]\n\`\`\`\n${file.data.slice(0,4000)}\n\`\`\``;
  }

  try {
    const headers={'Content-Type':'application/json','Authorization':'Bearer '+key};
    if(prov.extraHeaders) Object.assign(headers,prov.extraHeaders);
    
    let body, res, fullReply='';
    const thinkEl=document.getElementById('max-thinking');thinkEl.textContent='';
    
    if(prov.isAnthropic) {
      // Anthropic format
      const sysMsg=messages[0].content;
      const anthMsgs=messages.slice(1);
      headers['anthropic-version']='2023-06-01';headers['anthropic-dangerous-direct-browser-access']='true';
      delete headers['Authorization'];headers['x-api-key']=key;
      res=await fetch(prov.url,{method:'POST',headers,body:JSON.stringify({model:prov.defaultModel,max_tokens:2048,system:sysMsg,messages:anthMsgs})});
      const data=await res.json();
      fullReply=data.content?.[0]?.text||'Sin respuesta';
      thinkEl.textContent=fullReply;
    } else {
      const model = localStorage.getItem(`maxos_model_${provId}`) || prov.defaultModel;
      res=await fetch(prov.url,{method:'POST',headers,body:JSON.stringify({model,messages,max_tokens:2048,temperature:0.7,stream:true})});
      if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err?.error?.message||'Error '+res.status);}
      const reader=res.body.getReader(),dec=new TextDecoder();let buf='';
      while(true){
        const {done,value}=await reader.read();if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop();
        for(const line of lines){
          if(!line.startsWith('data: '))continue;
          const data=line.slice(6).trim();if(data==='[DONE]')continue;
          try{const j=JSON.parse(data);const d=j.choices?.[0]?.delta?.content;if(d){thinkEl.textContent+=d;fullReply+=d;msgs.scrollTop=msgs.scrollHeight;}}catch(e){}
        }
      }
    }
    chatHistory.push({role:'assistant',content:fullReply});
    if(voiceEnabled&&fullReply) speakText(fullReply.slice(0,400));
  } catch(e) {
    document.getElementById('max-thinking').innerHTML=`<span style="color:var(--red)">Error: ${escapeHTML(e.message)}</span>`;
  }
}

async function refreshRelayDevices() {
  const dot=document.getElementById('pc-dot'),name=document.getElementById('pc-name');
  if(!dot)return;
  dot.className='dev-dot off';name.textContent='Buscando...';
  try {
    // Try relay_devices first (legacy), then the profile-based path
    const paths = ['/relay_devices.json'];
    // Also check profile-based path if we know the device profile
    let found = null;
    for(const path of paths) {
      const r=await fetch(`${FB_URL}${path}?auth=${FB_SECRET}`,{signal:AbortSignal.timeout(5000)});
      if(!r.ok) continue;
      const data=await r.json();
      if(data&&Object.keys(data).length>0){
        const devices=Object.values(data).filter(d=>d.online&&(Date.now()-d.lastSeen)<30000);
        if(devices.length>0){found=devices[0];break;}
      }
    }
    // Also scan /devices/* for any profile
    if(!found){
      const r2=await fetch(`${FB_URL}/devices.json?auth=${FB_SECRET}&shallow=true`,{signal:AbortSignal.timeout(5000)});
      if(r2.ok){
        const profiles=await r2.json();
        if(profiles){
          for(const pid of Object.keys(profiles)){
            const r3=await fetch(`${FB_URL}/devices/${pid}.json?auth=${FB_SECRET}`,{signal:AbortSignal.timeout(4000)});
            if(!r3.ok)continue;
            const devs=await r3.json();
            if(!devs)continue;
            const online=Object.values(devs).filter(d=>d.online&&(Date.now()-d.lastSeen)<30000);
            if(online.length>0){found=online[0];found._pid=pid;break;}
          }
        }
      }
    }
    if(found){
      relayDevice=found;dot.className='dev-dot on';name.textContent=relayDevice.name||relayDevice.id||'PC Conectada';
      if(found._pid) relayDevice._pid=found._pid;
    } else {dot.className='dev-dot off';name.textContent='Sin dispositivo en línea';}
  } catch(e){if(dot)dot.className='dev-dot off';if(name)name.textContent='Sin dispositivo';console.warn(e);}
}

async function quickCmd(cmd) {
  if(!relayDevice){showToast('⚠️ Conectá un dispositivo primero');return;}
  const pid=relayDevice._pid||PROFILE_ID;
  const devId=relayDevice.id;
  try {
    // Write to both paths for compatibility
    await fetch(`${FB_URL}/relay_commands/${devId}.json?auth=${FB_SECRET}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd,ts:Date.now()})});
    if(pid&&devId) fetch(`${FB_URL}/devices/${pid}/${devId}/command.json?auth=${FB_SECRET}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd,ts:Date.now()})});
    showToast('✅ Comando enviado: '+cmd);
  } catch(e){showToast('❌ Error al enviar comando');}
}

async function sendPCCmd() {
  const inp=document.getElementById('pc-cmd'),result=document.getElementById('pc-result');

async function startCamera() {
  try {

    video.srcObject=camStream;video.style.display='block';if(ph)ph.style.display='none';

    document.getElementById('cam-analyze-btn').style.display='';
    document.getElementById('cam-photo-btn').style.display='';
    showToast('📷 Cámara activada');
  } catch(e){showToast('❌ No se pudo acceder a la cámara');}
}
function stopCamera(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const video=document.getElementById('cam-video'),ph=document.getElementById('cam-placeholder');
  if(video){video.style.display='none';}if(ph)ph.style.display='flex';
  document.getElementById('cam-start-btn').style.display='';

  document.getElementById('cam-analyze-btn').style.display='none';
  document.getElementById('cam-photo-btn').style.display='none';
}
function takePhoto(){
  const video=document.getElementById('cam-video'),canvas=document.getElementById('cam-canvas');
  if(!video||!canvas)return;
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  const imgData=canvas.toDataURL('image/jpeg',.85);
  // Open in new window
  const win=window.open();win.document.write(`<img src="${imgData}" style="max-width:100%">`);
  showToast('📸 Foto capturada');
}
async function analyzeCamera(){
  const video=document.getElementById('cam-video'),canvas=document.getElementById('cam-canvas');
  if(!video||!canvas)return;
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  const imgData=canvas.toDataURL('image/jpeg',.8);
  await doVisionAnalysis(imgData,'Analizá esta imagen de cámara. Describí qué ves con detalle.');
}

let screenStream=null;
async function startScreenShare(){
  try {
    screenStream=await navigator.mediaDevices.getDisplayMedia({video:true});
    document.getElementById('screen-start-btn').style.display='none';
    document.getElementById('screen-stop-btn').style.display='';
    document.getElementById('screen-analyze-btn').style.display='';
    showToast('🖥️ Pantalla compartida');
    screenStream.getTracks()[0].onended=()=>stopScreenShare();
  } catch(e){showToast('❌ No se pudo compartir la pantalla');}
}
function stopScreenShare(){
  if(screenStream){screenStream.getTracks().forEach(t=>t.stop());screenStream=null;}
  document.getElementById('screen-start-btn').style.display='';
  document.getElementById('screen-stop-btn').style.display='none';
  document.getElementById('screen-analyze-btn').style.display='none';
}
async function analyzeScreen(){
  if(!screenStream)return;
  const track=screenStream.getTracks()[0];
  const img=new ImageCapture(track);
  const bmp=await img.grabFrame();
  const canvas=document.createElement('canvas');canvas.width=bmp.width;canvas.height=bmp.height;
  canvas.getContext('2d').drawBitmapData?canvas.getContext('2d').drawBitmapData(bmp):canvas.getContext('2d').drawImage(bmp,0,0);
  const data=canvas.toDataURL('image/jpeg',.75);
  await doVisionAnalysis(data,'Analizá esta captura de pantalla. Describí qué ves y qué está haciendo el usuario.');
}

async function analyzeUploadedImage(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>await doVisionAnalysis(e.target.result,'Analizá esta imagen con detalle.');
  reader.readAsDataURL(file);
}

async function doVisionAnalysis(imageData, prompt) {
  const result=document.getElementById('vision-result');
  if(!result)return;
  result.style.display='block';result.textContent='Analizando...';
  const key=KEYS.groq||KEYS.openrouter;
  if(!key){result.textContent='⚠️ Necesitás una API key en 🔑 API Keys.';return;}
  const isOR=!KEYS.groq;
  const endpoint=isOR?'https://openrouter.ai/api/v1/chat/completions':'https://api.groq.com/openai/v1/chat/completions';
  const model=isOR?'meta-llama/llama-3.2-11b-vision-instruct:free':'llama-3.2-11b-vision-preview';
  try {
    const headers={'Content-Type':'application/json','Authorization':'Bearer '+key};
    if(isOR)headers['HTTP-Referer']='https://maxos.app';
    const res=await fetch(endpoint,{method:'POST',headers,body:JSON.stringify({model,max_tokens:1024,messages:[{role:'user',content:[{type:'image_url',image_url:{url:imageData}},{type:'text',text:prompt}]}]})});
    const data=await res.json();
    result.textContent=data.choices?.[0]?.message?.content||'Sin respuesta';
  } catch(e){result.textContent='Error: '+e.message;}
}

async function speakText(text) {
  if(!voiceEnabled) return;
  if(KEYS.el && KEYS.el_voice) {
    try {
      const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${KEYS.el_voice}/stream`,{
        method:'POST',
        headers:{'xi-api-key':KEYS.el,'Content-Type':'application/json'},
        body:JSON.stringify({text:text.slice(0,400),model_id:'eleven_multilingual_v2',voice_settings:{stability:0.5,similarity_boost:0.8}})
      });
      if(r.ok){const blob=await r.blob();const url=URL.createObjectURL(blob);const a=new Audio(url);a.volume=voiceVol;a.play();return;}
    } catch(e){}
  }
  // Fallback Web Speech
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.slice(0,400));
  u.lang='es-ES';u.rate=voiceSpeed;u.volume=voiceVol;u.pitch=0.88;
  const vs=window.speechSynthesis.getVoices();
  const male=vs.find(v=>/microsoft/i.test(v.name)&&/es/i.test(v.lang)&&!/zira|helena|laura/i.test(v.name))||vs.find(v=>/es/i.test(v.lang));
  if(male)u.voice=male;
  window.speechSynthesis.speak(u);
}

function testVoice(){
  const prev=voiceEnabled;voiceEnabled=true;
  speakText('Soy MAX, tu asistente con inteligencia de genio. Sistema operativo holográfico iniciado.');
  voiceEnabled=prev;
}

async function testELVoice(){
  if(!KEYS.el){showToast('⚠️ Necesitás la key de ElevenLabs');return;}
  const vid=KEYS.el_voice||EL_VOICES_KNOWN[0].id;
  const prev=voiceEnabled;const prevVoice=KEYS.el_voice;
  voiceEnabled=true; if(!KEYS.el_voice) KEYS.el_voice=vid;
  await speakText('Sistema MAX iniciado. Voz ElevenLabs activa y funcionando correctamente.');
  voiceEnabled=prev; if(!prevVoice) KEYS.el_voice='';
}

async function fetchWeather(){
  const city=document.getElementById('wcity')?.value||'Montevideo',content=document.getElementById('wcontent');
  if(!content)return;
  const ICONS={'113':'☀️','116':'⛅','119':'☁️','122':'☁️','143':'🌫️','176':'🌦️','200':'⛈️','227':'❄️','248':'🌫️','263':'🌦️','293':'🌧️','302':'🌧️','311':'🌧️','320':'🌨️','353':'🌦️','386':'⛈️','389':'⛈️'};
  try {
    const r=await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`,{signal:AbortSignal.timeout(6000)});
    if(!r.ok)throw new Error('Ciudad no encontrada');
    const d=await r.json();const c=d.current_condition?.[0];
    if(!c)throw new Error('Sin datos');
    const icon=ICONS[c.weatherCode]||'🌡️';
    const fc=d.weather?.slice(0,5)||[];
    const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    content.innerHTML=`
      <div class="weather-wrap">
        <div class="weather-ico">${icon}</div>
        <div class="weather-city">${d.nearest_area?.[0]?.areaName?.[0]?.value||city}</div>
        <div class="weather-temp">${c.temp_C}°C</div>
        <div class="weather-desc">${c.lang_es?.[0]?.value||c.weatherDesc?.[0]?.value||''}</div>
        <div class="weather-details">
          <div class="wd-item"><div class="wd-lbl">Humedad</div><div class="wd-val">${c.humidity}%</div></div>
          <div class="wd-item"><div class="wd-lbl">Viento</div><div class="wd-val">${c.windspeedKmph}km/h</div></div>
          <div class="wd-item"><div class="wd-lbl">Sensación</div><div class="wd-val">${c.FeelsLikeC}°C</div></div>
          <div class="wd-item"><div class="wd-lbl">UV</div><div class="wd-val">${c.uvIndex}</div></div>
          <div class="wd-item"><div class="wd-lbl">Visib.</div><div class="wd-val">${c.visibility}km</div></div>
          <div class="wd-item"><div class="wd-lbl">Presión</div><div class="wd-val">${c.pressure}hPa</div></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(${fc.length},1fr);gap:6px;margin-top:4px;">
          ${fc.map(d=>{const dt=new Date(d.date);const di=ICONS[d.hourly?.[4]?.weatherCode]||'🌡️';return`<div class="wd-item"><div class="wd-lbl">${days[dt.getDay()]}</div><div style="font-size:1.1rem;">${di}</div><div class="wd-val">${d.mintempC}°/${d.maxtempC}°</div></div>`;}).join('')}
        </div>
      </div>`;
  } catch(e){content.innerHTML=`<div style="color:var(--red);padding:30px;text-align:center;font-size:.72rem;font-family:'Rajdhani',sans-serif;">${e.message}</div>`;}
}
